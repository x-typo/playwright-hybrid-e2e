name: E2E Tests
on:
  schedule:
    - cron: "0 7 * * *"

  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pages: write
  checks: write

jobs:
  desktop-UI:
    name: UI Tests - Chrome - Run ${{ github.run_number }}
    timeout-minutes: 300
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        env:
          main_USERNAME: ${{ secrets.main_USERNAME }}
          main_PASSWORD: ${{ secrets.main_PASSWORD }}
          mfa_USERNAME: ${{ secrets.mfa_USERNAME }}
          mfa_PASSWORD: ${{ secrets.mfa_PASSWORD }}
        run: npx playwright test --project=chromeUI
        continue-on-error: true

      - name: Install junit-viewer
        run: npm install -g junit-viewer

      - name: UI Tests Reports - Chrome - Run ${{ github.run_number }}
        id: generate_report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: UI Tests Results - Chrome - Run ${{ github.run_number }}
          path: desktop-junit-reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.15.1
        if: always()
        with:
          check_run: false
          files: |
            desktop-junit-reports/junit.xml

