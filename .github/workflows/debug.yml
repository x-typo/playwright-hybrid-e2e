name: Debug
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pages: write
  checks: write

jobs:
  test:
    name: Run ${{ github.run_number }} - Debug
    timeout-minutes: 300
    runs-on: ubuntu-latest
    continue-on-error: true

    environment:
      name: Test
      url: ${{ steps.outputs.page_url }}

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        env:
          main_USERNAME: ${{ secrets.main_USERNAME }}
          main_PASSWORD: ${{ secrets.main_PASSWORD }}
          mfa_USERNAME: ${{ secrets.mfa_USERNAME }}
          mfa_PASSWORD: ${{ secrets.mfa_PASSWORD }}
        run: npx playwright test --project=chrome_Dev_UI "tests/e2e/ui/desktop/uiTests/login.test.ts"
        continue-on-error: true

      - name: Install junit-viewer
        run: npm install -g junit-viewer

      - name: UI Tests Reports - Chrome - Run ${{ github.run_number }}
        id: generate_report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: UI Tests Results - Chrome - Run ${{ github.run_number }}
          path: desktop-junit-reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.15.1
        if: always()
        with:
          check_run: false
          files: |
            desktop-junit-reports/junit.xml

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v3

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: "playwright-report/"

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

  workflowcard-link:
    name: Test Result Page
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: https://fantastic-adventure-gqqrlwk.pages.github.io
    steps:
      - name: Get the URL of the deployed site
        id: get_url
        run: echo "size=https://fantastic-adventure-gqqrlwk.pages.github.io" >> $GITHUB_OUTPUT
